let dadosFiltrados = [...dados];

function limparCNPJ(valor) {
    return String(valor).replace(/\D/g, "");
}

function renderTabela(data) {
    const thead = document.querySelector('#tabela thead');
    const tbody = document.querySelector('#tabela tbody');
    thead.innerHTML = '';
    tbody.innerHTML = '';

    if (!data || data.length === 0) {
        document.getElementById('total').innerText = 'Nenhum registro encontrado';
        return;
    }

    const headers = Object.keys(data[0]);
    let headerRow = '<tr>';
    headers.forEach(h => headerRow += `<th>${h}</th>`);
    headerRow += '</tr>';
    thead.innerHTML = headerRow;

    data.forEach(row => {
        let rowHtml = '<tr>';
        headers.forEach(h => rowHtml += `<td>${row[h] ?? ''}</td>`);
        rowHtml += '</tr>';
        tbody.innerHTML += rowHtml;
    });

    document.getElementById('total').innerText = `Total de registros encontrados: ${data.length}`;
}

function aplicarFiltro() {
    const cnpjInput = limparCNPJ(document.getElementById('cnpj').value);
    const lojaInput = document.getElementById('loja').value.toLowerCase();
    const filialInput = document.getElementById('filial').value.toLowerCase();

    dadosFiltrados = dados.filter(row => {

        const cnpjLinha = limparCNPJ(row.CNPJ || "");
        const lojaLinha = String(row.LOJA || "").toLowerCase();
        const filialLinha = String(row.FILIAL || "").toLowerCase();

        return cnpjLinha.includes(cnpjInput) &&
               lojaLinha.includes(lojaInput) &&
               filialLinha.includes(filialInput);
    });

    renderTabela(dadosFiltrados);
}

function copiarResultado() {
    if (!dadosFiltrados.length) return;

    const headers = Object.keys(dadosFiltrados[0]);
    let texto = headers.join("\t") + "\n";

    dadosFiltrados.forEach(row => {
        texto += headers.map(h => row[h]).join("\t") + "\n";
    });

    navigator.clipboard.writeText(texto).then(() => {
        alert("Resultado copiado!");
    });
}

document.getElementById('cnpj').addEventListener('input', aplicarFiltro);
document.getElementById('loja').addEventListener('input', aplicarFiltro);
document.getElementById('filial').addEventListener('input', aplicarFiltro);

renderTabela(dados);
